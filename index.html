<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DailyWorkTime</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-solid: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --faint: #86868b;
      --line: rgba(60, 60, 67, 0.18);
      --line-strong: rgba(60, 60, 67, 0.28);
      --blue: #007aff;
      --green: #34c759;
      --amber: #ff9f0a;
      --red: #ff3b30;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.10);
      --radius: 8px;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(0, 122, 255, 0.08), transparent 36%),
        linear-gradient(315deg, rgba(52, 199, 89, 0.09), transparent 34%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .app-titlebar {
      display: grid;
      gap: 6px;
      margin-bottom: 18px;
    }

    .app-title {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.02;
      letter-spacing: 0;
      font-weight: 760;
    }

    .app-tagline {
      width: min(420px, 100%);
      border: 0;
      border-radius: 6px;
      padding: 3px 0;
      color: var(--muted);
      background: transparent;
      font-size: 17px;
      line-height: 1.4;
      outline: none;
    }

    .app-tagline:focus {
      padding-left: 8px;
      background: rgba(118, 118, 128, 0.10);
    }

    .identity-strip {
      display: flex;
      align-items: stretch;
      gap: 8px;
    }

    .history-control {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.74);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }

    .history-control input {
      width: 150px;
      min-height: 34px;
      padding: 5px 8px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text);
    }

    .date-weekday {
      min-width: 50px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
      white-space: nowrap;
    }

    .user-switch {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      align-items: center;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
    }

    .user-card {
      display: grid;
      gap: 5px;
      min-width: 0;
      min-height: 66px;
      padding: 8px 10px;
      border: 0;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .user-card:first-child {
      color: var(--text);
      background: #fff;
      box-shadow: 0 5px 18px rgba(0, 0, 0, 0.10);
    }

    .user-card span {
      font-size: 11px;
      font-weight: 700;
      color: var(--faint);
    }

    .user-name-input {
      width: 100%;
      min-width: 0;
      min-height: 26px;
      padding: 2px 0;
      border: 0;
      border-radius: 0;
      color: inherit;
      background: transparent;
      font-weight: 750;
      outline: none;
    }

    .icon-button,
    .primary-button,
    .text-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      border-radius: var(--radius);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .icon-button {
      width: 38px;
      color: var(--text);
      background: rgba(118, 118, 128, 0.12);
    }

    .icon-button:hover,
    .text-button:hover {
      background: rgba(118, 118, 128, 0.18);
    }

    .icon-button:active,
    .primary-button:active,
    .text-button:active {
      transform: scale(0.97);
    }

    .primary-button {
      padding: 0 14px;
      color: #fff;
      background: var(--blue);
      box-shadow: 0 8px 20px rgba(0, 122, 255, 0.24);
      font-weight: 600;
    }

    .text-button {
      padding: 0 12px;
      color: var(--text);
      background: rgba(118, 118, 128, 0.12);
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .surface {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      -webkit-backdrop-filter: blur(26px);
      backdrop-filter: blur(26px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 12px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .small-note {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .targets {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 0 18px 18px;
    }

    .target {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.68);
      padding: 12px;
    }

    .target-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .target-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--line-strong);
    }

    .target.done .status-dot {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(52, 199, 89, 0.14);
    }

    .time-pair {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .time-input-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 40px;
      gap: 6px;
      align-items: center;
    }

    label {
      color: var(--faint);
      font-size: 12px;
      font-weight: 600;
    }

    .time-entry,
    input[type="date"] {
      color: var(--text);
    }

    .time-entry,
    input[type="date"],
    .target input {
      width: 100%;
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: rgba(118, 118, 128, 0.11);
      padding: 7px 9px;
      outline: none;
    }

    input:focus {
      border-color: rgba(0, 122, 255, 0.45);
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.12);
    }

    .progress-wrap {
      padding: 0 18px 18px;
    }

    .progress-track {
      position: relative;
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(118, 118, 128, 0.15);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 220ms ease;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .entries {
      display: grid;
      gap: 10px;
      padding: 0 18px 18px;
    }

    .entry {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(120px, 1fr) minmax(100px, 0.9fr) 38px;
      align-items: end;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.76);
    }

    .duration {
      min-height: 40px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 7px;
      background: rgba(0, 122, 255, 0.10);
      color: #0057b8;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .duration.invalid {
      background: rgba(255, 59, 48, 0.10);
      color: var(--red);
      font-family: var(--font);
      font-size: 13px;
    }

    .empty {
      padding: 28px 18px 34px;
      text-align: center;
      color: var(--muted);
    }

    .summary {
      position: sticky;
      top: 18px;
    }

    .total-block {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--line);
    }

    .total-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .total-time {
      margin-top: 8px;
      font-size: clamp(36px, 7vw, 54px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 750;
    }

    .total-sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .archive {
      margin-top: 18px;
      padding: 16px 18px 18px;
    }

    .compare {
      margin-top: 18px;
      padding: 16px 18px 18px;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .compare-person {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.70);
    }

    .compare-name {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .compare-time {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 760;
      line-height: 1.1;
    }

    .compare-result {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: rgba(0, 122, 255, 0.09);
      color: #0057b8;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.4;
    }

    .share-tools {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .share-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .share-code {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.70);
      color: var(--text);
      padding: 10px;
      outline: none;
      font: 12px/1.4 var(--mono);
    }

    .share-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .archive-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      max-height: 280px;
      overflow: auto;
    }

    .archive-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.70);
    }

    .archive-date {
      font-weight: 650;
    }

    .archive-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .pill {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(52, 199, 89, 0.13);
      color: #16843a;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .icon {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 860px) {
      .topbar,
      .grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .history-control {
        justify-self: start;
      }

      .grid {
        display: grid;
      }

      .summary {
        position: static;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 20px, 1120px);
        padding-top: 16px;
      }

      .targets,
      .time-pair,
      .entry {
        grid-template-columns: 1fr;
      }

      .entry {
        align-items: stretch;
      }

      .entry .icon-button {
        width: 100%;
      }

      .entry .time-input-wrap .icon-button {
        width: 40px;
      }

      .history-control {
        width: 100%;
        justify-content: space-between;
      }

      .history-control input {
        width: 100%;
      }

      .identity-strip {
        width: 100%;
      }

      .user-switch {
        flex: 1;
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="app-titlebar">
      <h1 class="app-title">每日搬砖记录</h1>
      <input class="app-tagline" id="taglineInput" value="今天你上工了吗？" aria-label="应用副标题">
    </section>
    <header class="topbar">
      <div class="identity-strip">
        <div class="user-switch" aria-label="记录身份">
          <div class="user-card" data-user-id="me">
            <span>我的记录</span>
            <input class="user-name-input" id="meNameInput" data-user-name="me" value="我" aria-label="用户 1 名称">
          </div>
          <div class="user-card" data-user-id="friend">
            <span>对比对象</span>
            <input class="user-name-input" id="friendNameInput" data-user-name="friend" value="朋友" aria-label="用户 2 名称">
          </div>
        </div>
      </div>
      <div class="history-control" aria-label="选择日期">
        <button class="icon-button" id="prevDay" title="前一天" aria-label="前一天">
          <svg class="icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg>
        </button>
        <input type="date" id="datePicker" aria-label="记录日期">
        <span class="date-weekday" id="weekdayLabel">星期二</span>
        <button class="icon-button" id="nextDay" title="后一天" aria-label="后一天">
          <svg class="icon" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
        </button>
      </div>
    </header>

    <section class="grid">
      <div>
        <section class="surface">
          <div class="section-head">
            <div>
              <h2>今日目标</h2>
              <p class="small-note">按小时和分钟设置两个梯度目标。</p>
            </div>
          </div>
          <div class="targets">
            <article class="target" id="targetOneCard">
              <div class="target-top">
                <span class="target-label">第一目标</span>
                <span class="status-dot" aria-hidden="true"></span>
              </div>
              <div class="time-pair">
                <div class="field">
                  <label for="targetOneHours">小时</label>
                  <input id="targetOneHours" type="number" min="0" max="24" step="1" inputmode="numeric">
                </div>
                <div class="field">
                  <label for="targetOneMinutes">分钟</label>
                  <input id="targetOneMinutes" type="number" min="0" max="59" step="1" inputmode="numeric">
                </div>
              </div>
            </article>

            <article class="target" id="targetTwoCard">
              <div class="target-top">
                <span class="target-label">第二目标</span>
                <span class="status-dot" aria-hidden="true"></span>
              </div>
              <div class="time-pair">
                <div class="field">
                  <label for="targetTwoHours">小时</label>
                  <input id="targetTwoHours" type="number" min="0" max="24" step="1" inputmode="numeric">
                </div>
                <div class="field">
                  <label for="targetTwoMinutes">分钟</label>
                  <input id="targetTwoMinutes" type="number" min="0" max="59" step="1" inputmode="numeric">
                </div>
              </div>
            </article>
          </div>
          <div class="progress-wrap">
            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-meta">
              <span id="progressText">尚未开始</span>
              <span id="targetText">目标 0小时0分钟</span>
            </div>
          </div>
        </section>

        <section class="surface" style="margin-top: 18px;">
          <div class="section-head">
            <div>
              <h2>工作时段</h2>
              <p class="small-note">24小时制，结束时间早于开始时间会提示修正。</p>
            </div>
            <button class="primary-button" id="addEntry">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
              新增
            </button>
          </div>
          <div class="entries" id="entries"></div>
          <div class="empty" id="emptyState">点“新增”开始记录第一段工作时间。</div>
        </section>
      </div>

      <aside>
        <section class="surface summary">
          <div class="total-block">
            <div class="total-label">当天总计</div>
            <div class="total-time" id="totalTime">0小时0分钟</div>
            <div class="total-sub" id="summaryLine">设置目标后，这里会显示完成情况。</div>
          </div>
        </section>

        <section class="surface compare">
          <h2>今日对比</h2>
          <div class="compare-grid">
            <div class="compare-person">
              <div class="compare-name" id="meCompareName">我</div>
              <div class="compare-time" id="meCompareTime">0小时0分钟</div>
            </div>
            <div class="compare-person">
              <div class="compare-name" id="friendCompareName">朋友</div>
              <div class="compare-time" id="friendCompareTime">0小时0分钟</div>
            </div>
          </div>
          <div class="compare-result" id="compareResult">两个人今天都还没有记录。</div>
          <div class="share-tools">
            <div class="share-actions">
              <button class="text-button" id="exportShare" type="button">
                <svg class="icon" viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 8 5-5 5 5"></path><path d="M5 15v4h14v-4"></path></svg>
                生成分享码
              </button>
              <button class="text-button" id="importShare" type="button">
                <svg class="icon" viewBox="0 0 24 24"><path d="M12 21V9"></path><path d="m17 16-5 5-5-5"></path><path d="M5 5v4h14V5"></path></svg>
                导入对方
              </button>
            </div>
            <textarea class="share-code" id="shareCode" placeholder="这里会显示你的分享码，也可以放入对方发来的分享码。"></textarea>
            <div class="share-status" id="shareStatus"></div>
          </div>
        </section>

        <section class="surface archive">
          <h2>最近记录</h2>
          <div class="archive-list" id="archiveList"></div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "daily-work-time-records-v2";
    const LEGACY_STORAGE_KEY = "daily-work-time-records-v1";
    const USER_IDS = ["me", "friend"];
    const DEFAULT_DAY = {
      targets: [
        { hours: 4, minutes: 0 },
        { hours: 5, minutes: 0 }
      ],
      entries: []
    };
    const DEFAULT_STATE = {
      activeUser: "me",
      users: {
        me: { name: "我", days: {} },
        friend: { name: "朋友", days: {} }
      }
    };

    const $ = (id) => document.getElementById(id);
    const elements = {
      datePicker: $("datePicker"),
      weekdayLabel: $("weekdayLabel"),
      taglineInput: $("taglineInput"),
      prevDay: $("prevDay"),
      nextDay: $("nextDay"),
      userCards: Array.from(document.querySelectorAll(".user-card")),
      userNameInputs: Array.from(document.querySelectorAll(".user-name-input")),
      targetOneHours: $("targetOneHours"),
      targetOneMinutes: $("targetOneMinutes"),
      targetTwoHours: $("targetTwoHours"),
      targetTwoMinutes: $("targetTwoMinutes"),
      targetOneCard: $("targetOneCard"),
      targetTwoCard: $("targetTwoCard"),
      progressFill: $("progressFill"),
      progressText: $("progressText"),
      targetText: $("targetText"),
      entries: $("entries"),
      emptyState: $("emptyState"),
      addEntry: $("addEntry"),
      totalTime: $("totalTime"),
      summaryLine: $("summaryLine"),
      meCompareName: $("meCompareName"),
      meCompareTime: $("meCompareTime"),
      friendCompareName: $("friendCompareName"),
      friendCompareTime: $("friendCompareTime"),
      compareResult: $("compareResult"),
      exportShare: $("exportShare"),
      importShare: $("importShare"),
      shareCode: $("shareCode"),
      shareStatus: $("shareStatus"),
      archiveList: $("archiveList")
    };

    let records = loadRecords();
    records.activeUser = "me";
    elements.taglineInput.value = localStorage.getItem("daily-work-time-tagline") || "今天你上工了吗？";
    let activeDate = toDateKey(new Date());

    function loadRecords() {
      try {
        const current = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (current && current.users) return normalizeState(current);

        const legacyDays = JSON.parse(localStorage.getItem(LEGACY_STORAGE_KEY)) || {};
        return normalizeState({
          ...cloneDefaultState(),
          users: {
            me: { name: "我", days: legacyDays },
            friend: { name: "朋友", days: {} }
          }
        });
      } catch {
        return cloneDefaultState();
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function cloneDefaultState() {
      return JSON.parse(JSON.stringify(DEFAULT_STATE));
    }

    function cloneDefaultDay() {
      return JSON.parse(JSON.stringify(DEFAULT_DAY));
    }

    function normalizeState(state) {
      const normalized = cloneDefaultState();
      normalized.activeUser = USER_IDS.includes(state.activeUser) ? state.activeUser : "me";
      USER_IDS.forEach((userId) => {
        normalized.users[userId] = {
          ...normalized.users[userId],
          ...(state.users && state.users[userId] ? state.users[userId] : {})
        };
        normalized.users[userId].days = normalized.users[userId].days || {};
      });
      return normalized;
    }

    function getUser(userId = records.activeUser) {
      return records.users[userId];
    }

    function getUserName(userId) {
      const fallback = userId === "me" ? "用户 1" : "用户 2";
      return (getUser(userId).name || "").trim() || fallback;
    }

    function getDay(dateKey = activeDate, userId = records.activeUser) {
      const user = getUser(userId);
      if (!user.days[dateKey]) {
        user.days[dateKey] = cloneDefaultDay();
      }
      return user.days[dateKey];
    }

    function readDay(dateKey = activeDate, userId = records.activeUser) {
      return getUser(userId).days[dateKey] || cloneDefaultDay();
    }

    function toDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseDateKey(dateKey) {
      const [year, month, day] = dateKey.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function addDays(dateKey, amount) {
      const date = parseDateKey(dateKey);
      date.setDate(date.getDate() + amount);
      return toDateKey(date);
    }

    function formatDateLabel(dateKey) {
      const date = parseDateKey(dateKey);
      const formatter = new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });
      return formatter.format(date);
    }

    function formatWeekday(dateKey) {
      return new Intl.DateTimeFormat("zh-CN", { weekday: "long" }).format(parseDateKey(dateKey));
    }

    function timeToMinutes(value) {
      if (!value) return null;
      if (!/^\d{2}:\d{2}$/.test(value)) return null;
      const [hours, minutes] = value.split(":").map(Number);
      if (Number.isNaN(hours) || Number.isNaN(minutes)) return null;
      if (hours > 23 || minutes > 59) return null;
      return hours * 60 + minutes;
    }

    function formatTimeInput(value) {
      const digits = value.replace(/\D/g, "").slice(0, 4);
      if (digits.length <= 2) return digits;
      return `${digits.slice(0, 2)}:${digits.slice(2)}`;
    }

    function selectTimeInput(input) {
      requestAnimationFrame(() => {
        input.select();
      });
    }

    function getCurrentTimeValue() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");
      return `${hours}:${minutes}`;
    }

    function getCurrentMinutes() {
      return timeToMinutes(getCurrentTimeValue());
    }

    function durationForEntry(entry) {
      const start = timeToMinutes(entry.start);
      const end = timeToMinutes(entry.end);
      if (start === null) return { valid: false, minutes: 0, message: "待补全" };
      if (end === null && !entry.end) {
        const current = getCurrentMinutes();
        if (current < start) return { valid: false, minutes: 0, message: "请修正" };
        const minutes = current - start;
        return { valid: true, running: true, minutes, message: `进行中 · ${formatDuration(minutes)}` };
      }
      if (end === null) return { valid: false, minutes: 0, message: "待补全" };
      if (end < start) return { valid: false, minutes: 0, message: "请修正" };
      return { valid: true, minutes: end - start, message: formatDuration(end - start) };
    }

    function targetToMinutes(target) {
      return clampNumber(target.hours, 0, 24) * 60 + clampNumber(target.minutes, 0, 59);
    }

    function clampNumber(value, min, max) {
      const number = Number(value);
      if (!Number.isFinite(number)) return 0;
      return Math.min(max, Math.max(min, Math.floor(number)));
    }

    function formatDuration(totalMinutes) {
      const minutes = Math.max(0, Math.floor(totalMinutes));
      const hoursPart = Math.floor(minutes / 60);
      const minutesPart = minutes % 60;
      return `${hoursPart}小时${minutesPart}分钟`;
    }

    function formatProgressLabel(label, totalMinutes, targetMinutes) {
      if (targetMinutes <= 0) return `${label} 0%`;
      const percent = Math.min(100, Math.round((totalMinutes / targetMinutes) * 100));
      return `${label} ${percent}%`;
    }

    function formatProgressTarget(totalMinutes, targetMinutes, targetLabel) {
      if (targetMinutes <= 0) return `距离${targetLabel}0%`;
      const percent = Math.min(100, Math.round((totalMinutes / targetMinutes) * 100));
      return `距离${targetLabel}${percent}%`;
    }

    function calculateDay(day) {
      const durations = day.entries.map(durationForEntry);
      const total = durations.reduce((sum, item) => sum + (item.valid ? item.minutes : 0), 0);
      const validCount = durations.filter((item) => item.valid && item.minutes > 0).length;
      const runningCount = durations.filter((item) => item.running).length;
      return { durations, total, validCount, runningCount };
    }

    function updateTarget(index, hoursInput, minutesInput) {
      const day = getDay();
      day.targets[index] = {
        hours: clampNumber(hoursInput.value, 0, 24),
        minutes: clampNumber(minutesInput.value, 0, 59)
      };
      saveRecords();
      render();
    }

    function render() {
      const day = getDay();
      const result = calculateDay(day);
      elements.datePicker.value = activeDate;
      elements.weekdayLabel.textContent = formatWeekday(activeDate);
      renderUserTabs();

      elements.targetOneHours.value = day.targets[0].hours;
      elements.targetOneMinutes.value = day.targets[0].minutes;
      elements.targetTwoHours.value = day.targets[1].hours;
      elements.targetTwoMinutes.value = day.targets[1].minutes;

      renderEntries(day, result);
      renderSummary(day, result);
      renderComparison();
      renderArchive();
    }

    function renderUserTabs() {
      elements.userNameInputs.forEach((input) => {
        input.value = getUserName(input.dataset.userName);
      });
    }

    function renderEntries(day, result) {
      elements.entries.innerHTML = "";
      elements.emptyState.hidden = day.entries.length > 0;

      day.entries.forEach((entry, index) => {
        const duration = result.durations[index];
        const row = document.createElement("article");
        row.className = "entry";
        row.innerHTML = `
          <div class="field">
            <label for="start-${index}">开始</label>
            <div class="time-input-wrap">
              <input class="time-entry" id="start-${index}" type="text" value="${entry.start || ""}" aria-label="开始时间" inputmode="numeric" maxlength="5" placeholder="HHMM">
              <button class="icon-button now-button" type="button" data-time-field="start" title="记录当前开始时间" aria-label="记录当前开始时间">
                <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle><path d="M12 8v5l3 2"></path></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="end-${index}">结束</label>
            <div class="time-input-wrap">
              <input class="time-entry" id="end-${index}" type="text" value="${entry.end || ""}" aria-label="结束时间" inputmode="numeric" maxlength="5" placeholder="HHMM">
              <button class="icon-button now-button" type="button" data-time-field="end" title="记录当前结束时间" aria-label="记录当前结束时间">
                <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle><path d="M12 8v5l3 2"></path></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label>时长</label>
            <div class="duration ${duration.valid ? "" : "invalid"}">${duration.message}</div>
          </div>
          <button class="icon-button delete-button" title="删除这一段" aria-label="删除这一段">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m19 6-1 14H6L5 6"></path></svg>
          </button>
        `;

        const [startInput, endInput] = row.querySelectorAll("input");
        startInput.addEventListener("click", () => selectTimeInput(startInput));
        endInput.addEventListener("click", () => selectTimeInput(endInput));
        startInput.addEventListener("input", () => updateEntry(index, "start", formatTimeInput(startInput.value)));
        endInput.addEventListener("input", () => updateEntry(index, "end", formatTimeInput(endInput.value)));
        row.querySelector('[data-time-field="start"]').addEventListener("click", () => updateEntry(index, "start", getCurrentTimeValue()));
        row.querySelector('[data-time-field="end"]').addEventListener("click", () => updateEntry(index, "end", getCurrentTimeValue()));
        row.querySelector(".delete-button").addEventListener("click", () => removeEntry(index));
        elements.entries.appendChild(row);
      });
    }

    function renderSummary(day, result) {
      const targetOne = targetToMinutes(day.targets[0]);
      const targetTwo = targetToMinutes(day.targets[1]);
      const maxTarget = Math.max(targetOne, targetTwo, 1);
      const progress = Math.min(100, Math.round((result.total / maxTarget) * 100));
      const firstDone = result.total >= targetOne && targetOne > 0;
      const secondDone = result.total >= targetTwo && targetTwo > 0;

      elements.totalTime.textContent = formatDuration(result.total);
      elements.targetOneCard.classList.toggle("done", firstDone);
      elements.targetTwoCard.classList.toggle("done", secondDone);
      elements.progressFill.style.width = `${progress}%`;
      elements.progressText.textContent = "当前进度";

      if (secondDone) {
        elements.targetText.textContent = formatProgressTarget(result.total, targetTwo, "第二目标");
        elements.summaryLine.textContent = "今天的两个梯度目标都已达成。";
      } else if (firstDone) {
        elements.targetText.textContent = formatProgressTarget(result.total, targetTwo, "第二目标");
        elements.summaryLine.textContent = `距离第二目标还差${formatDuration(Math.max(targetTwo - result.total, 0))}。`;
      } else {
        elements.targetText.textContent = formatProgressTarget(result.total, targetOne, "第一目标");
        if (result.total > 0) {
          elements.summaryLine.textContent = `距离第一目标还差${formatDuration(Math.max(targetOne - result.total, 0))}。`;
        } else {
          elements.summaryLine.textContent = "添加工作时段后会自动统计。";
        }
      }
    }

    function renderArchive() {
      const activeUser = getUser();
      const dates = Object.keys(activeUser.days)
        .filter((dateKey) => activeUser.days[dateKey].entries.length > 0 || dateKey === activeDate)
        .sort((a, b) => b.localeCompare(a))
        .slice(0, 12);

      elements.archiveList.innerHTML = "";
      if (dates.length === 0) {
        elements.archiveList.innerHTML = `<div class="small-note">还没有记录。</div>`;
        return;
      }

      dates.forEach((dateKey) => {
        const day = getDay(dateKey);
        const result = calculateDay(day);
        const item = document.createElement("button");
        item.className = "archive-item";
        item.type = "button";
        item.innerHTML = `
          <div>
            <div class="archive-date">${dateKey}</div>
            <div class="archive-meta">${result.validCount}段 · ${formatDuration(result.total)}</div>
          </div>
          <span class="pill">${dateKey === activeDate ? "当前" : "查看"}</span>
        `;
        item.addEventListener("click", () => {
          activeDate = dateKey;
          render();
        });
        elements.archiveList.appendChild(item);
      });
    }

    function renderComparison() {
      const meResult = calculateDay(readDay(activeDate, "me"));
      const friendResult = calculateDay(readDay(activeDate, "friend"));
      const difference = Math.abs(meResult.total - friendResult.total);
      const meName = getUserName("me");
      const friendName = getUserName("friend");

      elements.meCompareName.textContent = meName;
      elements.meCompareTime.textContent = formatDuration(meResult.total);
      elements.friendCompareName.textContent = friendName;
      elements.friendCompareTime.textContent = formatDuration(friendResult.total);

      if (meResult.total === 0 && friendResult.total === 0) {
        elements.compareResult.textContent = "两个人今天都还没有记录。";
      } else if (difference === 0) {
        elements.compareResult.textContent = "今天两个人的工作时长一样。";
      } else if (meResult.total > friendResult.total) {
        elements.compareResult.textContent = `${meName}今天多工作了${formatDuration(difference)}。`;
      } else {
        elements.compareResult.textContent = `${friendName}今天多工作了${formatDuration(difference)}。`;
      }
    }

    function addEntry() {
      const day = getDay();
      day.entries.push({ start: "", end: "" });
      saveRecords();
      render();
      const newest = elements.entries.lastElementChild;
      if (newest) newest.querySelector("input").focus();
    }

    function updateEntry(index, key, value) {
      const day = getDay();
      day.entries[index][key] = value;
      saveRecords();
      render();
      const input = document.getElementById(`${key}-${index}`);
      if (input) {
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      }
    }

    function removeEntry(index) {
      const day = getDay();
      day.entries.splice(index, 1);
      saveRecords();
      render();
    }

    function updateUserName(userId, value) {
      getUser(userId).name = value.trim();
      saveRecords();
      renderComparison();
    }

    function encodeSharePayload(payload) {
      const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      return `DWT-${base64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "")}`;
    }

    function parseBase64Payload(base64) {
      const padded = base64 + "=".repeat((4 - (base64.length % 4)) % 4);
      return JSON.parse(decodeURIComponent(escape(atob(padded))));
    }

    function decodeSharePayload(code) {
      const raw = String(code || "").trim();
      const withoutPrefix = raw.replace(/^DWT-/i, "");
      const compact = withoutPrefix.replace(/\s+/g, "");
      const candidates = [
        compact.replace(/-/g, "+").replace(/_/g, "/"),
        raw.replace(/\s+/g, ""),
        raw.replace(/^DWT-/i, "").trim().replace(/\s+/g, "+")
      ].filter(Boolean);

      let lastError = null;
      for (const candidate of Array.from(new Set(candidates))) {
        try {
          return parseBase64Payload(candidate);
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("invalid share code");
    }

    function createShareCode() {
      const payload = {
        version: 2,
        date: activeDate,
        displayName: getUserName("me"),
        name: getUserName("me"),
        day: getDay(activeDate, "me")
      };
      return encodeSharePayload(payload);
    }

    function normalizeSharedDay(day) {
      const source = day && typeof day === "object" ? day : cloneDefaultDay();
      const sourceTargets = Array.isArray(source.targets) ? source.targets : [];
      return {
        targets: DEFAULT_DAY.targets.map((defaultTarget, index) => {
          const target = sourceTargets[index] || defaultTarget;
          return {
          hours: clampNumber(target && target.hours, 0, 24) || defaultTarget.hours,
          minutes: clampNumber(target && target.minutes, 0, 59)
          };
        }),
        entries: Array.isArray(source.entries) ? source.entries.map((entry) => ({
          start: formatTimeInput(entry && entry.start ? entry.start : ""),
          end: formatTimeInput(entry && entry.end ? entry.end : "")
        })) : []
      };
    }

    async function exportShareCode() {
      const code = createShareCode();
      elements.shareCode.value = code;
      elements.shareStatus.textContent = "已生成今天的分享码，可以发给对方。";
      try {
        await navigator.clipboard.writeText(code);
        elements.shareStatus.textContent = "已生成并复制到剪贴板，可以直接发给对方。";
      } catch {
        elements.shareCode.focus();
        elements.shareCode.select();
      }
    }

    async function readClipboardText() {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.clipboard) {
        return await window.webkit.messageHandlers.clipboard.postMessage("read");
      }

      try {
        return await navigator.clipboard.readText();
      } catch {
        throw new Error("clipboard unavailable");
      }
    }

    async function importShareCode() {
      try {
        const clipboardText = await readClipboardText();
        elements.shareCode.value = clipboardText;
        const code = clipboardText.trim();
        if (!code) {
          throw new Error("empty clipboard");
        }

        const payload = decodeSharePayload(code);
        if (!payload || ![1, 2].includes(payload.version) || !payload.date || !payload.day) {
          throw new Error("invalid payload");
        }
        const importedDate = String(payload.date);
        const importedName = (payload.displayName || payload.name || "").trim();
        if (importedName) {
          getUser("friend").name = importedName;
        }
        getUser("friend").days[importedDate] = normalizeSharedDay(payload.day);
        activeDate = importedDate;
        records.activeUser = "me";
        saveRecords();
        render();
        elements.shareStatus.textContent = `已导入${getUserName("friend")}定义的名称和${importedDate}的记录。`;
      } catch {
        elements.shareStatus.textContent = "分享码无法识别，请先复制微信里的完整分享码，再点击导入对方。";
      }
    }

    elements.addEntry.addEventListener("click", addEntry);
    elements.userNameInputs.forEach((input) => {
      input.addEventListener("click", (event) => event.stopPropagation());
      input.addEventListener("input", () => updateUserName(input.dataset.userName, input.value));
      input.addEventListener("blur", () => {
        input.value = getUserName(input.dataset.userName);
        renderComparison();
      });
    });
    elements.exportShare.addEventListener("click", exportShareCode);
    elements.importShare.addEventListener("click", importShareCode);
    elements.taglineInput.addEventListener("input", () => {
      localStorage.setItem("daily-work-time-tagline", elements.taglineInput.value);
    });
    elements.prevDay.addEventListener("click", () => {
      activeDate = addDays(activeDate, -1);
      render();
    });
    elements.nextDay.addEventListener("click", () => {
      activeDate = addDays(activeDate, 1);
      render();
    });
    elements.datePicker.addEventListener("input", () => {
      activeDate = elements.datePicker.value || toDateKey(new Date());
      render();
    });
    elements.targetOneHours.addEventListener("input", () => updateTarget(0, elements.targetOneHours, elements.targetOneMinutes));
    elements.targetOneMinutes.addEventListener("input", () => updateTarget(0, elements.targetOneHours, elements.targetOneMinutes));
    elements.targetTwoHours.addEventListener("input", () => updateTarget(1, elements.targetTwoHours, elements.targetTwoMinutes));
    elements.targetTwoMinutes.addEventListener("input", () => updateTarget(1, elements.targetTwoHours, elements.targetTwoMinutes));

    render();
    setInterval(render, 60000);
  </script>
</body>
</html>
